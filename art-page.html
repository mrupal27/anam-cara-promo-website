<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anam Cara - Art Gallery</title>

    <link rel="stylesheet" href="art-page.css">
</head>

<body>


    <div class="all-content-centred">

        <h1>Art Gallery</h1>

        <p class="page-description">
            Explore the visual development of Anam Cara. <br/>
            Drom early character sketches to promotional artwork!
        </p>

        <!-- Character Concept Art -->

        <section class="art-section">

            <h2>Character Concept Art:</h2>

            <div class="gallery-row">

                <img src="assets/cconcept1.png" alt="Character Concept Art 1">
                <img src="assets/cconcept2.png" alt="Character Concept Art 2">
                <img src="assets/cconcept3.png" alt="Character Concept Art 3">
                <img src="assets/cconcept4.png" alt="Character Concept Art 4">
                <img src="assets/cconcept5.png" alt="Character Concept Art 5">

            </div>

        </section>

        <!-- Character Illustrations -->

        <section class="art-section">

            <h2>Character Illustrations:</h2>

            <div class="gallery-row">

                <img src="assets/illustration1.png" alt="Character Illustration 1">
                <img src="assets/illustration2.png" alt="Character Illustration 2">
                <img src="assets/illustration3.png" alt="Character Illustration 3">
                <img src="assets/illustration4.png" alt="Character Illustration 4">
                <img src="assets/illustration5.png" alt="Character Illustration 5">

            </div>

        </section>

        <!-- Monster Concept Art -->

        <section class="art-section">

            <h2>Monster Concept Art:</h2>

            <div class="gallery-row">

                <img src="assets/mconcept1.png" alt="Monster Concept Art 1">
                <img src="assets/mconcept2.png" alt="Monster Concept Art 2">
                <img src="assets/mconcept3.png" alt="Monster Concept Art 3">
                <img src="assets/mconcept4.png" alt="Monster Concept Art 4">
                <img src="assets/mconcept5.png" alt="Monster Concept Art 5">

            </div>

        </section>


        <!-- Game Posters -->

        <section class="art-section">

            <h2>Game Posters:</h2>

            <div class="gallery-row">

                <img src="assets/gp1.png" alt="Game Poster 1">
                <img src="assets/gp2.png" alt="Game Poster 2">
                <img src="assets/gp3.png" alt="Game Poster 3">

            </div>

        </section>

        <!-- Marketing Art -->

        <section class="art-section">

            <h2>Marketing Art:</h2>

            <div class="gallery-row">

                <img src="assets/marketing1.png" alt="Marketing Art 1">
                <img src="assets/marketing2.png" alt="Marketing Art 2">
                <img src="assets/marketing3.png" alt="Marketing Art 3">
                <img src="assets/marketing4.png" alt="Marketing Art 4">
                <img src="assets/marketing5.png" alt="Marketing Art 5">

            </div>

        </section>

    </div>


</body>

</html>
